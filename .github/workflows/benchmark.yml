name: Benchmarks

on:
  workflow_dispatch:

jobs:
  generate-graphs:
    runs-on: macos-latest
    env:
      IREE_TOKENIZERS_BUILD: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.1.1"
      - uses: dtolnay/rust-toolchain@stable
      - name: Fetch root deps
        run: mix deps.get
      - name: Fetch benchmark deps
        run: mix deps.get
        working-directory: bench
      - name: Generate fixture comparison graphs
        run: mix run compare.exs
        working-directory: bench
      - name: Generate model matrix graphs
        run: mix run model_matrix_graphs.exs
        working-directory: bench
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokenizer-benchmark-graphs
          path: bench/results
